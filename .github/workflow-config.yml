# GitHub Actions Workflow Configuration
#
# This file controls enable/disable toggles for shared workflows.
# Workflows default to enabled if this file is missing.
#
# - enabled: workflow 자체 활성화 (false면 수동 트리거도 비활성)
# - auto: PR 생성 시 자동 실행 여부 (없으면 해당 없음, 수동 트리거는 enabled만 체크)

# Shared workflow version pin for jhw7500/automation.
automation_ref: v1.28

workflows:
  # Repo-specific
  build-test:
    enabled: true
    description: "Cross-compile (aarch64) + host codec tests"

  # Shared Gemini workflows
  gemini-dispatch:
    enabled: true
    description: "Central dispatcher for Gemini commands"

  gemini-invoke:
    enabled: true
    description: "General Gemini CLI invocation"

  gemini-review:
    enabled: true
    description: "PR code review with Gemini (manual: @gemini-cli /review)"

  gemini-triage:
    enabled: true
    description: "Issue triage and labeling"

  gemini-auto-review:
    enabled: false
    auto: false
    description: "Automatic PR review with Gemini (disabled: GCP project denied access)"

  gemini-scheduled-triage:
    enabled: false
    description: "Scheduled issue triage (disabled to avoid hourly runs)"

  # Shared Claude workflows
  claude:
    enabled: true
    description: "Claude AI integration (manual: @claude)"

  claude-code-review:
    enabled: true
    auto: true
    description: "Claude automatic PR review"

  # OpenCode workflows
  opencode-auto-review:
    enabled: false
    auto: false
    description: "OpenCode automatic PR review (disabled: opencode exit 1 — token/setup pending)"

  # Repo automation helpers
  bump-automation-ref:
    enabled: false
    description: "Auto-bump jhw7500/automation refs (disabled: GITHUB_TOKEN lacks 'workflows' permission)"
