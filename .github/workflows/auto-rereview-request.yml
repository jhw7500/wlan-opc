name: Auto Re-review Request

on:
  pull_request:
    types: [synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to notify reviewers'
        required: true
        type: number
      force_run:
        description: 'Run even if disabled in config'
        type: boolean
        default: false

jobs:
  check-enabled:
    name: Check if enabled
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: Check workflow config
        id: check
        uses: ./.github/actions/check-workflow-enabled
        with:
          workflow-name: auto-rereview-request
          force-run: ${{ github.event.inputs.force_run || 'false' }}

  rereview:
    needs: check-enabled
    if: needs.check-enabled.outputs.enabled == 'true'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: jhw7500/automation/.github/workflows/auto-rereview-request.yml@v1.23
    secrets: inherit
