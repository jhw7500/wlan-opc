name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    uses: 'jhw7500/automation/.github/workflows/claude-code-review.yml@v1.29'
    with:
      pr_number: '${{ github.event.pull_request.number }}'
      force_run: false
    secrets: 'inherit'
