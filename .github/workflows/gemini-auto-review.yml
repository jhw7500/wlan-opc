name: Gemini Auto PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  gemini-review:
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    permissions:
      contents: 'read'
      pull-requests: 'write'
      issues: 'write'
      id-token: 'write'
    uses: 'jhw7500/automation/.github/workflows/gemini-auto-review.yml@v1.31'
    with:
      pr_number: '${{ github.event.pull_request.number }}'
    secrets: 'inherit'
