name: '🧪 Gemini Manual PR Review'

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review (e.g. 45)'
        required: true
        type: string
      additional_context:
        description: 'Optional extra context for the review prompt'
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      pr_title: ${{ steps.pr.outputs.title }}
      pr_body: ${{ steps.pr.outputs.body }}
    steps:
      - name: Validate pr_number
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "pr_number must be a positive integer"
            exit 1
          fi

      - name: Fetch PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          title="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title --jq .title)"
          body="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq .body)"

          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          echo "$title" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  review:
    needs: prepare
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    uses: jhw7500/automation/.github/workflows/gemini-review.yml@v1.28
    with:
      pr_number: ${{ inputs.pr_number }}
      issue_title: ${{ needs.prepare.outputs.pr_title }}
      issue_body: ${{ needs.prepare.outputs.pr_body }}
      additional_context: ${{ inputs.additional_context }}
    secrets: inherit
